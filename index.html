<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>테트리스 - 바이브 코딩 실습</title>
  <style>
    /* ===== 기본 레이아웃 ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Consolas', monospace;
      color: #e2e8f0;
    }

    .game-container {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    /* ===== 게임 캔버스 ===== */
    #gameCanvas {
      border: 2px solid #334155;
      background: #0f172a;
      display: block;
    }

    /* ===== 사이드 패널 ===== */
    .side-panel {
      width: 150px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
    }

    .panel-box h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .panel-box .value {
      font-size: 28px;
      font-weight: bold;
      color: #e2e8f0;
    }

    /* 게임 오버 오버레이 */
    #overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
      font-size: 24px;
      color: #f1f5f9;
    }

    #overlay.show { display: flex; }

    #restartBtn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 28px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Consolas', monospace;
    }
    #restartBtn:hover { background: #2563eb; }

    .canvas-wrapper {
      position: relative;
    }

    /* 조작 안내 */
    .controls {
      font-size: 12px;
      color: #475569;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<div class="game-container">

  <!-- 메인 캔버스 -->
  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="300" height="600"></canvas>
    <div id="overlay">
      <div>GAME OVER</div>
      <button id="restartBtn">다시 시작</button>
    </div>
  </div>

  <!-- 사이드 패널 -->
  <div class="side-panel">
    <div class="panel-box">
      <h3>점수</h3>
      <div class="value" id="scoreDisplay">0</div>
    </div>
    <div class="panel-box">
      <h3>레벨</h3>
      <div class="value" id="levelDisplay">1</div>
    </div>
    <div class="panel-box">
      <h3>라인</h3>
      <div class="value" id="linesDisplay">0</div>
    </div>
    <div class="panel-box controls">
      <h3>조작법</h3>
      ← → 이동<br>
      ↑ 회전<br>
      ↓ 빠르게<br>
    </div>
  </div>

</div>

<script>
// ============================================================
//  ■ 상수 정의 (Constants) — 이미 완성되어 있습니다
// ============================================================
const COLS        = 10;       // 보드 가로 칸 수
const ROWS        = 20;       // 보드 세로 칸 수
const BLOCK_SIZE  = 30;       // 한 칸의 픽셀 크기

// 테트리스 블록 7종 모양 (1 = 블록 있음)
const SHAPES = {
  I: [[1, 1, 1, 1]],
  O: [[1, 1],
      [1, 1]],
  T: [[0, 1, 0],
      [1, 1, 1]],
  S: [[0, 1, 1],
      [1, 1, 0]],
  Z: [[1, 1, 0],
      [0, 1, 1]],
  L: [[1, 0],
      [1, 0],
      [1, 1]],
  J: [[0, 1],
      [0, 1],
      [1, 1]],
};

// 블록별 색상
const COLORS = {
  I: '#00f0f0',
  O: '#f0f000',
  T: '#a000f0',
  S: '#00f000',
  Z: '#f00000',
  L: '#f0a000',
  J: '#0000f0',
};

// 블록 종류 목록
const PIECE_TYPES = Object.keys(SHAPES);  // ['I','O','T','S','Z','L','J']

// ============================================================
//  ■ 캔버스 초기화 — 이미 완성되어 있습니다
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// ============================================================
//  ■ 게임 상태 변수
// ============================================================
let board        = [];          // 2D 배열: null = 빈칸, 색상 문자열 = 블록
let currentPiece = null;        // 현재 떨어지는 블록 { shape, color, x, y }
let score        = 0;
let level        = 1;
let linesCleared = 0;
let gameOver     = false;
let lastTime     = 0;
let dropInterval = 1000;        // ms — 자동 하강 간격 (레벨에 따라 줄어듦)

// ============================================================
//  ■ 단일 블록 그리기 헬퍼 — 이미 완성되어 있습니다
//    x, y: 보드 기준 칸 좌표
//    color: 채울 색상 문자열
// ============================================================
function drawBlock(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(
    x * BLOCK_SIZE,
    y * BLOCK_SIZE,
    BLOCK_SIZE - 1,
    BLOCK_SIZE - 1
  );
  // 하이라이트 (윗면 밝게)
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 1, 4);
}

// ============================================================
//  TODO 1: initBoard()
//  ─────────────────────────────────────────────────────────
//  보드를 초기화합니다.
//  board 변수를 ROWS × COLS 크기의 2D 배열로 만들고,
//  모든 칸을 null 로 채워주세요.
//
//  힌트:
//    board = [];
//    for (ROWS 만큼 반복) {
//      board에 null이 COLS개인 배열을 push
//    }
// ============================================================
function initBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    // 각 행을 null로 채운 배열로 초기화
    board.push(new Array(COLS).fill(null));
  }
}


// ============================================================
//  TODO 2: createPiece()
//  ─────────────────────────────────────────────────────────
//  새 블록을 생성해서 currentPiece에 할당합니다.
//  PIECE_TYPES 중 랜덤으로 하나를 선택하고,
//  x 는 보드 중앙, y 는 0 으로 설정하세요.
//
//  반환(또는 할당)할 객체 형태:
//    { shape: SHAPES[type], color: COLORS[type], x: ..., y: 0 }
//
//  힌트:
//    const type = PIECE_TYPES[ Math.floor(Math.random() * PIECE_TYPES.length) ];
//    중앙 x = Math.floor((COLS - shape[0].length) / 2)
// ============================================================
function createPiece() {
  // PIECE_TYPES 배열에서 랜덤으로 블록 종류 선택
  const type  = PIECE_TYPES[Math.floor(Math.random() * PIECE_TYPES.length)];
  const shape = SHAPES[type];

  // x: 보드 가로 중앙에서 블록 폭의 절반만큼 왼쪽으로
  const x = Math.floor((COLS - shape[0].length) / 2);

  currentPiece = {
    shape,
    color: COLORS[type],
    x,
    y: 0,
  };
}


// ============================================================
//  TODO 3: isCollision(piece, dx, dy)
//  ─────────────────────────────────────────────────────────
//  piece 를 (dx, dy) 만큼 이동했을 때 충돌이 발생하면 true,
//  아니면 false 를 반환합니다.
//
//  검사해야 할 충돌 3가지:
//    ① 왼쪽·오른쪽 벽 (x < 0 또는 x >= COLS)
//    ② 바닥         (y >= ROWS)
//    ③ 다른 블록    (board[y][x] !== null)
//
//  힌트:
//    piece.shape 을 이중 for 로 순회하면서
//    값이 1인 칸의 실제 보드 좌표 = (piece.x + col + dx, piece.y + row + dy)
// ============================================================
function isCollision(piece, dx, dy) {
  for (let row = 0; row < piece.shape.length; row++) {
    for (let col = 0; col < piece.shape[row].length; col++) {
      // 블록이 없는 칸은 검사 생략
      if (!piece.shape[row][col]) continue;

      // 이동 후 실제 보드 좌표 계산
      const nx = piece.x + col + dx;
      const ny = piece.y + row + dy;

      // ① 왼쪽·오른쪽 벽 충돌
      if (nx < 0 || nx >= COLS) return true;

      // ② 바닥 충돌
      if (ny >= ROWS) return true;

      // ③ 이미 고정된 블록과 충돌 (ny < 0 인 경우는 아직 보드 위쪽이므로 제외)
      if (ny >= 0 && board[ny][nx] !== null) return true;
    }
  }
  return false;
}



// ============================================================
//  TODO 4: rotate(shape)
//  ─────────────────────────────────────────────────────────
//  2D 배열 shape 을 90도 시계 방향으로 회전한 새 배열을 반환합니다.
//
//  원리:
//    회전 후 [row][col] = 원래 [rows-1-col][row]
//    또는 전치(transpose) 후 각 행을 뒤집기
//
//  예시 (T 블록):
//    입력:  [[0,1,0],[1,1,1]]
//    출력:  [[1,0],[1,1],[1,0]]
//
//  힌트:
//    const rows = shape.length, cols = shape[0].length;
//    결과 배열 크기는 cols × rows (가로·세로 뒤바뀜)
// ============================================================
function rotate(shape) {
  const rows = shape.length;
  const cols = shape[0].length;

  // 회전 후 크기는 cols × rows (가로·세로 뒤바뀜)
  const rotated = Array.from({ length: cols }, () => new Array(rows).fill(0));

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      // 90도 시계 방향: 새[c][rows-1-r] = 원래[r][c]
      rotated[c][rows - 1 - r] = shape[r][c];
    }
  }

  return rotated;
}

// ============================================================
//  TODO 5: placePiece()
//  ─────────────────────────────────────────────────────────
//  currentPiece 를 board 에 고정시킵니다.
//  shape 배열을 순회하며 값이 1인 칸을
//  board[y][x] = currentPiece.color 로 설정하세요.
// ============================================================
function placePiece() {
  for (let row = 0; row < currentPiece.shape.length; row++) {
    for (let col = 0; col < currentPiece.shape[row].length; col++) {
      // 값이 1인 칸만 보드에 색상으로 고정
      if (currentPiece.shape[row][col]) {
        board[currentPiece.y + row][currentPiece.x + col] = currentPiece.color;
      }
    }
  }
}

// ============================================================
//  TODO 6: clearLines()
//  ─────────────────────────────────────────────────────────
//  board 에서 모든 칸이 채워진 행(row)을 제거하고
//  위의 행들을 아래로 내려옵니다. 점수도 계산해주세요.
//
//  점수 계산 예시 (1줄=100, 2줄=300, 3줄=500, 4줄=800):
//    const points = [0, 100, 300, 500, 800];
//    score += points[제거된 줄 수] * level;
//
//  힌트:
//    가득 찬 행 = 모든 칸이 null 이 아닌 행
//    제거 후: board.unshift(new Array(COLS).fill(null))  ← 맨 위에 빈 행 추가
//
//  linesCleared 와 level 도 갱신하세요.
//    linesCleared += 제거한 줄 수;
//    level = Math.floor(linesCleared / 10) + 1;
//    dropInterval = Math.max(100, 1000 - (level - 1) * 100);
// ============================================================
function clearLines() {
  // 점수 테이블 (동시 제거 줄 수에 따른 보너스)
  const points = [0, 100, 300, 500, 800];

  // 가득 찬 행만 필터링하여 제거
  const before = board.length;
  board = board.filter(row => row.some(cell => cell === null));
  const removed = before - board.length;

  // 제거된 줄 수만큼 맨 위에 빈 행 추가
  for (let i = 0; i < removed; i++) {
    board.unshift(new Array(COLS).fill(null));
  }

  // 점수 · 라인 수 · 레벨 · 하강 속도 갱신
  if (removed > 0) {
    score        += points[removed] * level;
    linesCleared += removed;
    level         = Math.floor(linesCleared / 10) + 1;
    dropInterval  = Math.max(100, 1000 - (level - 1) * 100);
    updateUI();
  }
}

// ============================================================
//  TODO 7: draw()
//  ─────────────────────────────────────────────────────────
//  매 프레임 화면을 다시 그립니다.
//
//  순서:
//    ① 배경 지우기 (ctx.fillStyle = '#0f172a' 후 fillRect 전체)
//    ② board 를 순회하며 null 이 아닌 칸을 drawBlock 으로 그리기
//    ③ currentPiece 가 있으면 shape 을 순회하며 그리기
//
//  이미 배경 지우기(①)는 아래에 작성되어 있습니다.
// ============================================================
function draw() {
  // 배경 지우기
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 격자 선 (옅게)
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 0.5;
  for (let c = 0; c < COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(c * BLOCK_SIZE, 0);
    ctx.lineTo(c * BLOCK_SIZE, canvas.height);
    ctx.stroke();
  }
  for (let r = 0; r < ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * BLOCK_SIZE);
    ctx.lineTo(canvas.width, r * BLOCK_SIZE);
    ctx.stroke();
  }

  // ② board에 고정된 블록 그리기
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // null이 아닌 칸만 해당 색상으로 그림
      if (board[r][c]) drawBlock(c, r, board[r][c]);
    }
  }

  // ③ 현재 떨어지는 블록(currentPiece) 그리기
  if (currentPiece) {
    for (let row = 0; row < currentPiece.shape.length; row++) {
      for (let col = 0; col < currentPiece.shape[row].length; col++) {
        // 값이 1인 칸만 그림
        if (currentPiece.shape[row][col]) {
          drawBlock(
            currentPiece.x + col,
            currentPiece.y + row,
            currentPiece.color
          );
        }
      }
    }
  }
}


// ============================================================
//  TODO 8: 키보드 입력 처리
//  ─────────────────────────────────────────────────────────
//  ArrowLeft  : 충돌 없으면 currentPiece.x -= 1
//  ArrowRight : 충돌 없으면 currentPiece.x += 1
//  ArrowDown  : 충돌 없으면 currentPiece.y += 1
//               충돌이면  → placePiece() → clearLines() → createPiece()
//                         → 새 블록도 충돌이면 gameOver = true
//  ArrowUp    : rotate(currentPiece.shape) 후
//               충돌 없으면 currentPiece.shape = 회전된 shape
//               충돌이면 취소 (기존 shape 유지)
// ============================================================
document.addEventListener('keydown', (e) => {
  if (gameOver) return;
  if (!currentPiece) return;

  switch (e.key) {
    case 'ArrowLeft':
      // 왼쪽 이동: 충돌 없을 때만 x 감소
      if (!isCollision(currentPiece, -1, 0)) currentPiece.x -= 1;
      break;

    case 'ArrowRight':
      // 오른쪽 이동: 충돌 없을 때만 x 증가
      if (!isCollision(currentPiece, 1, 0)) currentPiece.x += 1;
      break;

    case 'ArrowDown':
      // 빠른 하강: 충돌 없으면 한 칸 내림
      if (!isCollision(currentPiece, 0, 1)) {
        currentPiece.y += 1;
      } else {
        // 바닥 또는 블록에 닿으면 즉시 고정 → 줄 제거 → 새 블록 생성
        placePiece();
        clearLines();
        createPiece();
        // 새 블록 생성 직후 충돌 = 게임 오버
        if (isCollision(currentPiece, 0, 0)) {
          gameOver = true;
          showGameOver();
        }
      }
      break;

    case 'ArrowUp':
      // 회전: 회전된 shape 미리 계산
      const rotatedShape = rotate(currentPiece.shape);
      const rotatedPiece = { ...currentPiece, shape: rotatedShape };
      // 충돌 없을 때만 shape 교체, 충돌이면 원래 shape 유지
      if (!isCollision(rotatedPiece, 0, 0)) {
        currentPiece.shape = rotatedShape;
      }
      break;
  }

  draw(); // 입력 직후 화면 즉시 갱신
});


// ============================================================
//  TODO 9: gameLoop(timestamp)
//  ─────────────────────────────────────────────────────────
//  requestAnimationFrame 으로 반복 호출되는 게임 루프입니다.
//
//  동작:
//    1. gameOver 이면 리턴
//    2. deltaTime = timestamp - lastTime
//    3. deltaTime > dropInterval 이면:
//       a. 충돌 없으면 currentPiece.y += 1
//       b. 충돌이면:
//          - placePiece()
//          - clearLines()
//          - createPiece()
//          - 새 블록도 충돌이면 gameOver = true, 오버레이 표시
//       c. lastTime = timestamp
//    4. draw()
//    5. requestAnimationFrame(gameLoop)
// ============================================================
function gameLoop(timestamp) {
  if (gameOver) return;

  // 이전 프레임과의 경과 시간 계산
  const deltaTime = timestamp - lastTime;

  // dropInterval마다 블록 자동 하강
  if (deltaTime > dropInterval) {
    if (!isCollision(currentPiece, 0, 1)) {
      // 충돌 없으면 한 칸 아래로
      currentPiece.y += 1;
    } else {
      // 바닥 또는 블록에 닿으면 고정
      placePiece();
      clearLines();
      updateUI(); // 점수·레벨·라인 수 갱신
      createPiece();

      // 새 블록이 생성 즉시 충돌 → 게임 오버
      if (isCollision(currentPiece, 0, 0)) {
        gameOver = true;
        showGameOver();
        return; // 루프 종료
      }
    }
    // 다음 하강 기준 시간 갱신
    lastTime = timestamp;
  }

  draw();
  requestAnimationFrame(gameLoop); // 다음 프레임 예약
}

// ============================================================
//  ■ UI 업데이트 헬퍼 — 이미 완성되어 있습니다
// ============================================================
function updateUI() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('levelDisplay').textContent = level;
  document.getElementById('linesDisplay').textContent = linesCleared;
}

// ============================================================
//  ■ 게임 시작 / 재시작 — 이미 완성되어 있습니다
// ============================================================
function startGame() {
  initBoard();
  score        = 0;
  level        = 1;
  linesCleared = 0;
  gameOver     = false;
  dropInterval = 1000;
  lastTime     = 0;

  createPiece();
  updateUI();

  document.getElementById('overlay').classList.remove('show');
  requestAnimationFrame(gameLoop);
}

document.getElementById('restartBtn').addEventListener('click', startGame);

// 게임 오버 시 오버레이 표시는 gameLoop 안에서 처리
// 아래 함수를 호출해서 오버레이를 표시하세요:
function showGameOver() {
  document.getElementById('overlay').classList.add('show');
}

// 게임 시작!
startGame();
</script>
</body>
</html>
